<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- PWA essentials -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="sabG — Fresh groceries delivered in minutes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="sabG" />
    <meta name="application-name" content="sabG" />

    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/icon-192.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <title>sabG — Grocery Delivery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; }
      ::-webkit-scrollbar { display: none; }
      html { scrollbar-width: none; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run sabG.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js')
            .then(function (reg) { console.log('SW registered', reg.scope); })
            .catch(function (err) { console.log('SW failed', err); });
        });
      }
    </script>
  </body>
</html>
